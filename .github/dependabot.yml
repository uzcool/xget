version: 2
updates:
  # GitHub Actions dependencies
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
    open-pull-requests-limit: 5
    commit-message:
      prefix: "ci"
      include: "scope"
    labels:
      - "dependencies"
      - "github-actions"
    groups:
      docker-actions:
        applies-to: version-updates
        patterns:
          - "docker/build-push-action"
          - "docker/login-action"
          - "docker/metadata-action"
          - "docker/setup-buildx-action"
    reviewers:
      - "xixu-me"
    assignees:
      - "xixu-me"

  # npm dependencies
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
    open-pull-requests-limit: 5
    commit-message:
      prefix: "deps"
      include: "scope"
    labels:
      - "dependencies"
      - "npm"
    groups:
      cloudflare-dev:
        applies-to: version-updates
        patterns:
          - "@cloudflare/vitest-pool-workers"
          - "@cloudflare/workers-types"
          - "wrangler"
      linting:
        applies-to: version-updates
        patterns:
          - "@eslint/js"
          - "eslint"
          - "eslint-*"
    reviewers:
      - "xixu-me"
    assignees:
      - "xixu-me"
    versioning-strategy: increase

  # Docker base images
  - package-ecosystem: "docker"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
    open-pull-requests-limit: 5
    commit-message:
      prefix: "deps"
      include: "scope"
    labels:
      - "dependencies"
      - "docker"
    reviewers:
      - "xixu-me"
    assignees:
      - "xixu-me"
